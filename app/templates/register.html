{% extends "base.html" %}

{% block content %}

<style>

/* wrapper */
.register-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

/* 🔥 glass card */
.form-box {
    width: 360px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.25);

    animation: fadeUp 0.6s ease;
}

/* heading */
.form-box h2 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

/* inputs */
.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    color: white;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* focus glow */
input:focus {
    box-shadow: 0 0 6px #4facfe;
}

/* button */
.btn {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: #4facfe;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #00c6ff;
    transform: scale(1.05);
}

/* switch */
.switch {
    text-align: center;
    margin-top: 15px;
    color: white;
}

.switch a {
    color: #fff;
    font-weight: bold;
    text-decoration: underline;
}

/* animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

<div class="register-wrapper">

    <div class="form-box">

        <h2>📝 Create Account</h2>

        <form method="POST" action="{{ url_for('auth.register') }}">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create password" required>
            </div>

            <div class="form-group">
                <label>Section</label>
                <input type="text" name="section" placeholder="Enter your section" required>
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <p class="switch">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login</a>
        </p>

    </div>

</div>

{% endblock %}
