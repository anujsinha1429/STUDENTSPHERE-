{% extends "base.html" %}
{% block content %}

<style>

/* wrapper */
.setup-wrapper {
    max-width: 900px;
    margin: auto;
}

/* card */
.setup-card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* title */
.title {
    text-align: center;
    margin-bottom: 20px;
}

/* table */
table {
    width: 100%;
    border-collapse: collapse;
}

/* header */
th {
    background: #4facfe;
    color: white;
    padding: 10px;
}

/* rows */
td {
    padding: 10px;
    text-align: center;
}

tr:nth-child(even) {
    background: #f5f5f5;
}

/* inputs */
input {
    width: 80px;
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    text-align: center;
}

input:focus {
    border-color: #4facfe;
    outline: none;
}
.nav-btn {
    padding: 10px 16px;
    border-radius: 8px;
    margin: 5px;
    background: #4facfe;
    color: white;
    text-decoration: none;
    display: inline-block;
}
/* button */
.save-btn {
    display: block;
    margin: 20px auto 0;
    padding: 10px 20px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.save-btn:hover {
    background: #00c6ff;
}

</style>

<div class="setup-wrapper">

    <div class="setup-card">

        <h2 class="title">📊 One Time Attendance Setup</h2>

        <form method="POST">

            <table>
                <tr>
                    <th>Subject</th>
                    <th>Total Classes</th>
                    <th>Attended</th>
                </tr>

                {% for sub in subjects %}
                <tr>
                    <td>
                        {{ sub }}
                        <input type="hidden" name="subject" value="{{ sub }}">
                    </td>

                    <td>
                        <input type="number" name="total" placeholder="0" required>
                    </td>

                    <td>
                        <input type="number" name="present" placeholder="0" required>
                    </td>
                </tr>
                {% endfor %}
            </table>

            <button type="submit" class="save-btn">Save Setup</button>

        </form>
<a href="{{ url_for('auth.logout') }}" class="nav-btn logout">Logout</a>
    </div>
     

</div>

{% endblock %}
